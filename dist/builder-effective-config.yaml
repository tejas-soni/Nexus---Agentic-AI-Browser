directories:
  output: dist
  buildResources: build
appId: com.tejas.nexus
productName: Nexus
files:
  - filter:
      - main/**/*
      - renderer/**/*
      - preload/**/*
      - package.json
      - assets/**/*
win:
  target:
    - nsis
    - portable
  icon: assets/icons/icon.png
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
linux:
  target:
    - AppImage
    - deb
  icon: assets/icons/icon.png
  category: WebBrowser
electronVersion: 41.2.0
