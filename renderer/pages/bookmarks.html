<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bookmarks - Nexus</title>
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/components.css">
    <style>
        html, body {
            height: auto !important;
            overflow-y: auto !important;
            background-color: var(--bg-base);
        }
        body {
            color: var(--text-primary);
            padding: 40px;
            max-width: 1000px;
            margin: 0 auto;
            animation: fade-in 0.4s ease-out;
            min-height: 100vh;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 40px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
        }
        .header h1 {
            font-size: 2.5rem;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .search-container {
            position: relative;
            flex: 1;
            max-width: 400px;
            margin: 0 40px;
        }
        .search-container input {
            width: 100%;
            background: var(--bg-surface);
            border: 1px solid var(--border);
            padding: 12px 12px 12px 40px;
            border-radius: var(--radius-lg);
            color: var(--text-primary);
            font-size: 0.95rem;
            transition: all 0.3s var(--ease-spring);
        }
        .search-container input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(124, 77, 255, 0.2);
            outline: none;
        }
        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }
        .actions-bar {
            padding: 16px;
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            margin-bottom: 30px;
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .bookmark-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        .bookmark-card {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 20px;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            gap: 12px;
            transition: all 0.3s var(--ease-spring);
            position: relative;
        }
        .bookmark-card:hover {
            border-color: var(--accent);
            transform: translateY(-4px);
            background: var(--bg-elevated);
            box-shadow: var(--shadow-md);
        }
        .card-top {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .card-favicon {
            width: 32px;
            height: 32px;
            background: var(--bg-crust);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card-title {
            font-weight: 700;
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .card-url {
            font-size: 0.8rem;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .btn-remove {
            position: absolute;
            top: 10px;
            right: 10px;
            opacity: 0;
            transition: opacity 0.2s;
            color: var(--text-muted);
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
        }
        .bookmark-card:hover .btn-remove { opacity: 1; }
        .btn-remove:hover { color: var(--error); }
        .empty-state { text-align: center; padding: 100px 0; color: var(--text-muted); }
    </style>
</head>
<body>
    <div class="header">
        <h1>
            <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
            Bookmarks
        </h1>
        <div class="search-container">
            <svg class="search-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" id="bookmark-search" placeholder="Search saved pages...">
        </div>
    </div>

    <div class="actions-bar">
        <button class="btn btn-ghost" onclick="importBms()">Import JSON</button>
        <button class="btn btn-ghost" onclick="exportBms()">Export JSON</button>
        <div style="flex:1"></div>
        <small style="color:var(--text-muted)">Manage and synchronize your saved pages.</small>
    </div>

    <div id="bookmark-grid" class="bookmark-grid">
        <!-- Bookmarks will be injected here -->
    </div>

    <script>
        const grid = document.getElementById('bookmark-grid');
        const searchInput = document.getElementById('bookmark-search');

        function sendIPC(action, data) {
            return new Promise((resolve) => {
                const reqId = Date.now().toString() + Math.random();
                window._ipcCallbacks = window._ipcCallbacks || {};
                window._ipcCallbacks[reqId] = resolve;
                console.log('NEXUS_IPC:' + JSON.stringify({ action, data, reqId }));
            });
        }

        async function load() {
            try {
                const query = searchInput.value;
                const bms = await sendIPC('bookmarks.get', { search: query });
                
                if (bms.length === 0) {
                    grid.innerHTML = `<div class="empty-state">No bookmarks found${query ? ' for "' + query + '"' : ''}.</div>`;
                    return;
                }

                grid.innerHTML = bms.map(bm => `
                    <div class="bookmark-card-wrapper" style="position:relative">
                        <a class="bookmark-card" href="${bm.url}">
                            <div class="card-top">
                                <div class="card-favicon">${bm.favicon ? '<img src="'+bm.favicon+'" style="width:16px;height:16px;">' : '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>'}</div>
                                <div class="card-title">${bm.title || 'Untitled'}</div>
                            </div>
                            <div class="card-url">${bm.url}</div>
                        </a>
                        <button class="btn-remove" onclick="removeBm('${bm.id}', event)">
                            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
                        </button>
                    </div>
                `).join('');
            } catch (err) {
                grid.innerHTML = `<div class="empty-state" style="color:var(--error)">Error loading bookmarks: ${err.message}</div>`;
            }
        }

        window.removeBm = async (id, e) => {
            e.preventDefault();
            e.stopPropagation();
            await sendIPC('bookmarks.remove', id);
            load();
        };

        window.importBms = async () => {
            const res = await sendIPC('bookmarks.import');
            if (res.success) {
                alert('Imported ' + res.count + ' bookmarks.');
                load();
            }
        };

        window.exportBms = async () => {
            const res = await sendIPC('bookmarks.export');
            if (res.success) {
                alert('Bookmarks exported to ' + res.path);
            }
        };

        let searchTimeout;
        searchInput.oninput = () => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                console.log('[DEBUG:UI] Executing bookmark search:', searchInput.value);
                load();
            }, 150);
        };
        load();
    </script>
</body>
</html>
