<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bookmarks - Nexus</title>
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/components.css">
    <style>
        html, body {
            height: auto !important;
            overflow-y: auto !important;
            background-color: var(--bg-base);
        }
        body {
            color: var(--text-primary);
            padding: 40px;
            max-width: 1000px;
            margin: 0 auto;
            animation: fade-in 0.4s ease-out;
            min-height: 100vh;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 40px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
        }
        .header h1 {
            font-size: 2.5rem;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .actions-bar {
            padding: 16px;
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            margin-bottom: 30px;
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .bookmark-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        .bookmark-card {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 20px;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            gap: 12px;
            transition: all 0.3s var(--ease-spring);
            position: relative;
        }
        .bookmark-card:hover {
            border-color: var(--accent);
            transform: translateY(-4px);
            background: var(--bg-elevated);
            box-shadow: var(--shadow-md);
        }
        .card-top {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .card-favicon {
            width: 32px;
            height: 32px;
            background: var(--bg-crust);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card-title {
            font-weight: 700;
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .card-url {
            font-size: 0.8rem;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .btn-remove {
            position: absolute;
            top: 10px;
            right: 10px;
            opacity: 0;
            transition: opacity 0.2s;
            color: var(--text-muted);
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
        }
        .bookmark-card:hover .btn-remove { opacity: 1; }
        .btn-remove:hover { color: var(--error); }
        .empty-state { text-align: center; padding: 100px 0; color: var(--text-muted); }
    </style>
</head>
<body>
    <div class="header">
        <h1>
            <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
            Bookmarks
        </h1>
    </div>

    <div class="actions-bar">
        <button class="btn btn-ghost" onclick="importBms()">Import JSON</button>
        <button class="btn btn-ghost" onclick="exportBms()">Export JSON</button>
        <div style="flex:1"></div>
        <small style="color:var(--text-muted)">Manage and synchronize your saved pages.</small>
    </div>

    <div id="bookmark-grid" class="bookmark-grid">
        <!-- Bookmarks will be injected here -->
    </div>

    <script>
        const { nexus } = window;
        const grid = document.getElementById('bookmark-grid');

        async function load() {
            const bms = await nexus.bookmarks.get();
            if (bms.length === 0) {
                grid.innerHTML = '<div class="empty-state">No bookmarks saved yet.</div>';
                return;
            }

            grid.innerHTML = bms.map(bm => `
                <div class="bookmark-card-wrapper" style="position:relative">
                    <a class="bookmark-card" href="${bm.url}">
                        <div class="card-top">
                            <div class="card-favicon">${bm.favicon ? '<img src="'+bm.favicon+'" style="width:16px;height:16px;">' : '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>'}</div>
                            <div class="card-title">${bm.title || 'Untitled'}</div>
                        </div>
                        <div class="card-url">${bm.url}</div>
                    </a>
                    <button class="btn-remove" onclick="removeBm('${bm.id}', event)">
                        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
                    </button>
                </div>
            `).join('');
        }

        window.removeBm = async (id, e) => {
            e.preventDefault();
            e.stopPropagation();
            await nexus.bookmarks.remove(id);
            load();
        };

        window.importBms = async () => {
            const res = await nexus.bookmarks.import();
            if (res.success) {
                alert('Imported ' + res.count + ' bookmarks.');
                load();
            }
        };

        window.exportBms = async () => {
            const res = await nexus.bookmarks.export();
            if (res.success) {
                alert('Bookmarks exported to ' + res.path);
            }
        };

        load();
    </script>
</body>
</html>
