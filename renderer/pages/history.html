<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>History - Nexus</title>
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/components.css">
    <style>
        html, body {
            height: auto !important;
            overflow-y: auto !important;
            background-color: var(--bg-base);
        }
        body {
            color: var(--text-primary);
            padding: 40px;
            max-width: 1000px;
            margin: 0 auto;
            animation: fade-in 0.4s ease-out;
            min-height: 100vh;
        }
        .history-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 40px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
        }
        .history-header h1 {
            font-size: 2.5rem;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .search-container {
            position: relative;
            flex: 1;
            max-width: 400px;
            margin: 0 40px;
        }
        .search-container input {
            width: 100%;
            background: var(--bg-surface);
            border: 1px solid var(--border);
            padding: 12px 12px 12px 40px;
            border-radius: var(--radius-lg);
            color: var(--text-primary);
            font-size: 0.95rem;
            transition: all 0.3s var(--ease-spring);
        }
        .search-container input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(124, 77, 255, 0.2);
            outline: none;
        }
        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }
        .history-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .history-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            background: var(--bg-surface);
            border-radius: var(--radius-md);
            border: 1px solid transparent;
            transition: all 0.2s ease;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
        }
        .history-item:hover {
            border-color: var(--border);
            background: var(--bg-elevated);
            transform: translateX(4px);
        }
        .item-time {
            font-size: 0.8rem;
            color: var(--text-muted);
            width: 80px;
            flex-shrink: 0;
        }
        .item-favicon {
            width: 20px;
            height: 20px;
            margin: 0 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-crust);
            border-radius: 4px;
        }
        .item-content {
            flex: 1;
            min-width: 0;
        }
        .item-title {
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 2px;
        }
        .item-url {
            font-size: 0.8rem;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .item-actions {
            opacity: 0;
            transition: opacity 0.2s ease;
        }
        .history-item:hover .item-actions {
            opacity: 1;
        }
        .btn-delete {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-delete:hover {
            background: rgba(248, 113, 113, 0.1);
            color: var(--error);
        }
        .empty-state {
            text-align: center;
            padding: 100px 0;
            color: var(--text-muted);
        }
        .date-divider {
            margin: 24px 0 12px;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent);
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="history-header">
        <h1>
            <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            History
        </h1>
        <div class="search-container">
            <svg class="search-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" id="history-search" placeholder="Search visited pages...">
        </div>
        <button class="btn btn-ghost" id="btn-clear-history">Clear History</button>
    </div>

    <div id="history-container">
        <!-- History items will be injected here -->
    </div>

    <script>
        const container = document.getElementById('history-container');
        const searchInput = document.getElementById('history-search');
        const clearBtn = document.getElementById('btn-clear-history');

        function sendIPC(action, data) {
            return new Promise((resolve) => {
                const reqId = Date.now().toString() + Math.random();
                window._ipcCallbacks = window._ipcCallbacks || {};
                window._ipcCallbacks[reqId] = resolve;
                console.log('NEXUS_IPC:' + JSON.stringify({ action, data, reqId }));
            });
        }

        async function loadHistory() {
            const query = searchInput.value;
            const history = await sendIPC('history.get', { search: query, limit: 200 });
            
            if (history.length === 0) {
                container.innerHTML = `<div class="empty-state">No history found${query ? ' for "' + query + '"' : ''}.</div>`;
                return;
            }

            let html = '';
            let lastDate = '';

            history.forEach(item => {
                const dateObj = new Date(item.timestamp);
                const dateStr = dateObj.toLocaleDateString(undefined, { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
                const timeStr = dateObj.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

                if (dateStr !== lastDate) {
                    html += `<div class="date-divider">${dateStr}</div>`;
                    lastDate = dateStr;
                }

                const favicon = item.favicon ? `<img src="${item.favicon}" style="width:16px;height:16px;">` : `<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>`;

                html += `
                    <div class="history-item">
                        <div class="item-time">${timeStr}</div>
                        <div class="item-favicon">${favicon}</div>
                        <div class="item-content" onclick="window.location.href='${item.url}'">
                            <div class="item-title">${item.title || 'Untitled'}</div>
                            <div class="item-url">${item.url}</div>
                        </div>
                        <div class="item-actions">
                            <button class="btn-delete" title="Remove from history" onclick="deleteEntry(${item.id}, event)">
                                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
                            </button>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        window.deleteEntry = async (id, e) => {
            e.preventDefault();
            e.stopPropagation();
            await sendIPC('history.remove', id);
            loadHistory();
        };

        clearBtn.onclick = async () => {
            if (confirm('Are you sure you want to clear your entire browsing history?')) {
                await sendIPC('history.clear');
                loadHistory();
            }
        };

        searchInput.oninput = () => loadHistory();

        // Initial load
        loadHistory();
    </script>
</body>
</html>
